<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Roboto, sans-serif; background: #0a0a1a; color: #fff; }
.game-container {
  max-width: 960px;
  margin: 0 auto;
  padding: 0;
}
.game-frame {
  width: 100%;
  height: 70vh;
  min-height: 400px;
  border: none;
  border-radius: 0;
  background: #000;
}
.controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 12px;
  background: #1a1a35;
}
.ctrl-btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid rgba(120,100,240,0.3);
  background: #0f0f23;
  color: #eee;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.ctrl-btn:hover {
  background: #7c6cf0;
  border-color: #7c6cf0;
  color: #fff;
}
.game-info {
  max-width: 800px;
  margin: 24px auto;
  padding: 0 16px;
}
.game-info h1 {
  font-size: 24px;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #b0a4ff, #ff7eb3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.game-info p {
  color: #9999cc;
  line-height: 1.7;
  margin-bottom: 12px;
}
.back-link {
  display: inline-block;
  padding: 8px 16px;
  color: #b0a4ff;
  text-decoration: none;
  font-weight: 600;
}
</style>
</head>
<body>

<div class="game-container">
  <iframe class="game-frame" src="https://inkyedu118.github.io/g77/class-41" 
    allowfullscreen 
    allow="autoplay; fullscreen; gamepad" 
    scrolling="no" 
    title="Play Papa Hotdoggeria"></iframe>
  
  <div class="controls">
    <button class="ctrl-btn" onclick="document.querySelector('.game-frame').requestFullscreen()">⛶ Fullscreen</button>
    <button class="ctrl-btn" onclick="var f=document.querySelector('.game-frame');f.src=f.src">🔄 Reload</button>
    <button class="ctrl-btn" onclick="window.open('https://sites.google.com/view/my-game-site-123','_top')">🏠 More Games</button>
  </div>
</div>

<div class="game-info">
  <h1>Play Papa Hotdoggeria Unblocked</h1>
  <p>Play Papa Hotdoggeria for free online. This game is unblocked and can be played at school or work. No download required!</p>
  <p>Use your mouse and keyboard to control the game. Click the fullscreen button for the best experience.</p>
</div>

</body>
</html>
